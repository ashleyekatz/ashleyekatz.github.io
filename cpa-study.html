<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Exam Study Flashcards</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --background: #ecf0f1;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            text-align: center;
        }

        /* Flashcard Container */
        .flashcard-container {
            width: 90%;
            max-width: 500px;
            height: 300px;
            perspective: 1000px; /* Gives the 3D depth for the flip */
            cursor: pointer;
        }

        /* The card itself that rotates */
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        /* Front and Back of the card */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            text-align: center;
        }

        .card-front {
            background-color: var(--card-bg);
            color: var(--primary-color);
            font-size: 24px;
            font-weight: bold;
        }

        .card-back {
            background-color: var(--primary-color);
            color: var(--text-light);
            transform: rotateY(180deg);
            font-size: 18px;
            line-height: 1.5;
        }

        /* Navigation Controls */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        #card-counter {
            font-size: 16px;
            color: var(--secondary-color);
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        .instruction {
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>CPA Terminology</h1>

    <div class="flashcard-container" id="flashcard-container">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front" id="term-display">
                </div>
            <div class="card-face card-back" id="definition-display">
                </div>
        </div>
    </div>

    <p class="instruction">Click the card to flip</p>

    <div class="controls">
        <button id="prev-btn">Previous</button>
        <span id="card-counter">1 / 5</span>
        <button id="next-btn">Next</button>
    </div>

    <script>
        // CPA Study Data Array
        // Add as many terms as you need here!
        const cpaData = [
            {
                term: "Accrual Basis Accounting",
                definition: "Recognizing revenues when earned and expenses when incurred, regardless of when cash changes hands."
            },
            {
                term: "Amortization",
                definition: "The systematic allocation of the cost of an intangible asset over its useful life."
            },
            {
                term: "Goodwill",
                definition: "An intangible asset that arises when a buyer acquires an existing business for a price higher than the fair market value of its net assets."
            },
            {
                term: "EBITDA",
                definition: "Earnings Before Interest, Taxes, Depreciation, and Amortization. A proxy for a company's current operating profitability."
            },
            {
                term: "Contingent Liability",
                definition: "A potential liability that may occur depending on the outcome of an uncertain future event (e.g., pending lawsuits)."
            }
        ];

        // State variables
        let currentIndex = 0;
        let isFlipped = false;

        // DOM Elements
        const flashcard = document.getElementById('flashcard');
        const flashcardContainer = document.getElementById('flashcard-container');
        const termDisplay = document.getElementById('term-display');
        const definitionDisplay = document.getElementById('definition-display');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const cardCounter = document.getElementById('card-counter');

        // Initialize the app
        function loadCard(index) {
            // Unflip if it's currently showing the back
            if (isFlipped) {
                flashcard.classList.remove('is-flipped');
                isFlipped = false;
                
                // Wait for the flip animation to finish before changing text
                setTimeout(() => {
                    updateText(index);
                }, 300); // Half of the CSS transition time
            } else {
                updateText(index);
            }
        }

        function updateText(index) {
            termDisplay.textContent = cpaData[index].term;
            definitionDisplay.textContent = cpaData[index].definition;
            cardCounter.textContent = `${index + 1} / ${cpaData.length}`;
            
            // Update button states
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === cpaData.length - 1;
        }

        // Event Listeners
        flashcardContainer.addEventListener('click', () => {
            flashcard.classList.toggle('is-flipped');
            isFlipped = !isFlipped;
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent card from flipping when clicking buttons
            if (currentIndex > 0) {
                currentIndex--;
                loadCard(currentIndex);
            }
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent card from flipping when clicking buttons
            if (currentIndex < cpaData.length - 1) {
                currentIndex++;
                loadCard(currentIndex);
            }
        });

        // Add keyboard support (Left/Right arrows for nav, Space/Up/Down to flip)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && !nextBtn.disabled) {
                currentIndex++;
                loadCard(currentIndex);
            } else if (e.key === 'ArrowLeft' && !prevBtn.disabled) {
                currentIndex--;
                loadCard(currentIndex);
            } else if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                flashcard.classList.toggle('is-flipped');
                isFlipped = !isFlipped;
            }
        });

        // Load the first card on startup
        loadCard(currentIndex);
    </script>
</body>
</html>
