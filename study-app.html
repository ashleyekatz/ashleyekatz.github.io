<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Study Flashcards</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-front: #ffffff;
            --card-back: #34495e;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Top Navigation Link */
        .nav-header {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* App Container */
        .app-wrapper {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 { color: var(--primary); margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; }

        /* Flashcard Logic */
        .flashcard-container {
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            font-size: 1.4rem;
            text-align: center;
        }

        .front { background: var(--card-front); color: var(--primary); font-weight: bold; border: 2px solid #eee; }
        .back { background: var(--card-back); color: white; transform: rotateY(180deg); font-size: 1.1rem; line-height: 1.6; }

        /* Controls */
        .controls {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2980b9; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        #counter { font-weight: bold; color: var(--primary); width: 80px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-link">← Back to Main Repository</a>
    </div>

    <div class="app-wrapper">
        <h1>CPA Exam Prep</h1>
        <p class="subtitle">Mastering the Terminology</p>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face front" id="term">Loading...</div>
                <div class="card-face back" id="definition">Loading...</div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="prevCard()">Previous</button>
            <span id="counter">1 / 1</span>
            <button id="nextBtn" onclick="nextCard()">Next</button>
        </div>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #999;">Tip: Use Spacebar to flip or Arrow keys to navigate</p>
    </div>

    <script>
        const cards = [
    // --- FAR (Financial Accounting & Reporting) ---
    { t: "Accrual Accounting", d: "Records the impact of transactions when they occur, not necessarily when cash is paid or received." },
    { t: "Amortization", d: "The systematic allocation of the cost of an intangible asset over its useful life." },
    { t: "Contra-Asset Account", d: "An account with a credit balance that reduces the value of a related asset (e.g., Accumulated Depreciation)." },
    { t: "Deferred Revenue", d: "Cash received before services are performed; recorded as a liability until earned." },
    { t: "Depreciation", d: "The process of allocating the cost of a tangible asset over its useful life." },
    { t: "FIFO (First-In, First-Out)", d: "Inventory method where the oldest costs are assigned to Cost of Goods Sold first." },
    { t: "LIFO (Last-In, First-Out)", d: "Inventory method where the most recent costs are assigned to Cost of Goods Sold first." },
    { t: "Impairment", d: "A permanent decline in the fair value of an asset below its carrying amount (Book Value)." },
    { t: "Net Realizable Value (NRV)", d: "Estimated selling price minus the costs of completion, disposal, and transportation." },
    { t: "Subsequent Event", d: "An event occurring between the balance sheet date and the date financial statements are issued." },

    // --- AUD (Auditing & Attestation) ---
    { t: "Audit Risk", d: "The risk that the auditor expresses an inappropriate opinion when financial statements are materially misstated." },
    { t: "Assertions", d: "Representations by management (existence, completeness, valuation, etc.) embodied in the financial statements." },
    { t: "Independence", d: "The avoidance of circumstances that would cause a reasonable third party to doubt an auditor's integrity." },
    { t: "Internal Control", d: "A process designed to provide reasonable assurance regarding the achievement of entity objectives." },
    { t: "Management Rep Letter", d: "A letter from management to the auditor confirming the truthfulness of oral representations given during the audit." },
    { t: "Sampling Risk", d: "The risk that the auditor's conclusion based on a sample differs from the conclusion if the whole population were tested." },
    { t: "Segregation of Duties", d: "Dividing responsibilities for Authorization, Recording, and Custody (ARC) to prevent fraud/errors." },
    { t: "Substantive Procedures", d: "Audit procedures designed to detect material misstatements at the assertion level." },
    { t: "Unmodified Opinion", d: "A 'clean' audit report stating the financial statements present fairly in all material respects." },
    { t: "Working Papers", d: "The record of audit procedures performed, evidence obtained, and conclusions reached by the auditor." },

    // --- REG (Regulation & Tax) ---
    { t: "Adjusted Basis", d: "The cost of an asset plus capital improvements, minus accumulated depreciation." },
    { t: "Capital Gain", d: "The profit from the sale of an asset held for personal or investment purposes." },
    { t: "Fiduciary", d: "A person who holds a legal or ethical relationship of trust with one or more other parties." },
    { t: "Gift Tax Exclusion", d: "The amount an individual can give to another person annually without incurring a gift tax." },
    { t: "Gross Income", d: "All income from whatever source derived, unless specifically excluded by the tax code." },
    { t: "Itemized Deductions", d: "Specific expenses (like mortgage interest) that taxpayers subtract from AGI instead of the standard deduction." },
    { t: "Negligence", d: "Failure to exercise the level of care that a reasonably prudent person would exercise in similar circumstances." },
    { t: "Nexus", d: "A sufficient connection between a business and a state that allows the state to tax that business." },
    { t: "Pass-Through Entity", d: "A business (like an LLC) where income passes to owners to be taxed on their individual returns." },
    { t: "Statute of Frauds", d: "A legal rule requiring certain contracts (like real estate sales) to be in writing to be enforceable." }
];

        let index = 0;
        const cardEl = document.getElementById('card');
        const termEl = document.getElementById('term');
        const defEl = document.getElementById('definition');
        const countEl = document.getElementById('counter');

        function updateUI() {
            // Reset flip state before changing content
            cardEl.classList.remove('flipped');
            
            setTimeout(() => {
                termEl.innerText = cards[index].t;
                defEl.innerText = cards[index].d;
                countEl.innerText = `${index + 1} / ${cards.length}`;
                document.getElementById('prevBtn').disabled = index === 0;
                document.getElementById('nextBtn').disabled = index === cards.length - 1;
            }, 150); 
        }

        function flipCard() { cardEl.classList.toggle('flipped'); }
        function nextCard() { if(index < cards.length - 1) { index++; updateUI(); } }
        function prevCard() { if(index > 0) { index--; updateUI(); } }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if(e.code === 'Space') flipCard();
            if(e.code === 'ArrowRight') nextCard();
            if(e.code === 'ArrowLeft') prevCard();
        });

        // Start app
        updateUI();
    </script>
</body>
</html>
